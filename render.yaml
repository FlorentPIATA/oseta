services:
  # ── API (web service) ──────────────────────────────────────────────────────
  # CMD is defined in Dockerfile: bash scripts/start_api.sh
  # (alembic upgrade head → uvicorn)
  - type: web
    name: oseta-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      # Set these in the Render dashboard — never commit real values here
      - key: DATABASE_URL          # postgresql+asyncpg://user:pass@host/db?ssl=require
        sync: false
      - key: DATABASE_URL_SYNC     # postgresql://user:pass@host/db?sslmode=require
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: BRAVE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OSETA_MASTER_KEY
        sync: false
      # CORS_ORIGINS: JSON array of allowed origins, e.g. ["https://oseta.vercel.app"]
      - key: CORS_ORIGINS
        sync: false
      # REDIS_URL: optional (e.g. from Upstash). If unset, caching is bypassed.
      - key: REDIS_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

  # ── Daily pipeline ────────────────────────────────────────────────────────
  # Triggered externally by cron-job.org (free) at 05:00 UTC:
  #   POST https://oseta-api.onrender.com/correlations/refresh
  #   Header: X-Master-Key: <OSETA_MASTER_KEY>
  # No Render cron service needed — avoids paid plan requirement.
